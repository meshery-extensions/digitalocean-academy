# ECommerce Reference Architecture v2
#
# A complete, deployable microservices reference architecture for an AI-augmented
# storefront on DigitalOcean Kubernetes (DOKS). Rendered as a Meshery Design and
# embedded in the "Catalog & Reusable Templates" lesson.
#
# 15 Deployments + 13 Services in the `ecommerce` namespace, including the
# DigitalOcean-flavoured edges of the stack: `gradient-ai` (Gradient AI inference
# behind the recommendation path), `do-spaces` (object storage), and `opensearch`
# (product search).
#
#   kubectl apply -f designs/ecommerce-reference-architecture.yaml
#   mesheryctl design import -f designs/ecommerce-reference-architecture.yaml -s "Kubernetes Manifest"
#
# Education-focused: images are placeholders, replicas are 1, and there are no
# resource limits, probes, or network policy. Harden before any production use.
#
# Deliberately NOT production patterns, called out so they are not copied:
#   - `postgres` sets POSTGRES_PASSWORD inline. Real deployments must source it
#     from a Secret (or DigitalOcean Managed Databases) and never from plain env.
#   - No PersistentVolumeClaims: `postgres`, `redis`, and `opensearch` are
#     ephemeral here and lose their data on restart.
apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/part-of: ecommerce
  name: ecommerce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: analytics-worker
    tier: events
  name: analytics-worker
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-worker
  template:
    metadata:
      labels:
        app: analytics-worker
        tier: events
    spec:
      containers:
      - command:
        - sh
        - -c
        - sleep infinity
        image: busybox:1.36
        name: worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api-gateway
    tier: edge
  name: api-gateway
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: edge
    spec:
      containers:
      - image: nginx:1.27-alpine
        name: nginx
        ports:
        - containerPort: 80
          protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: auth-service
    tier: app
  name: auth-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: app
    spec:
      containers:
      - args:
        - -text=auth
        - -listen=:8080
        image: hashicorp/http-echo:1.0
        name: auth
        ports:
        - containerPort: 8080
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: auth-service
    tier: app
  name: auth-service
  namespace: ecommerce
spec:
  ports:
  - port: 8080
    protocol: TCP
  selector:
    app: auth-service
